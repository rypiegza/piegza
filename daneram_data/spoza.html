<script language="JavaScript">
var t = 0.0
var NN = document.layers
var IE = document.all

function fly()
{
	if(NN)
	{
		xPos = window.innerWidth/2 - 50
		yPos = window.innerHeight/2 - 5
		xAmpl = window.innerWidth/3
		yAmpl = window.innerHeight/3
	}
	else if(IE)
	{
		xPos = document.body.clientWidth/2 - 50
		yPos = document.body.clientHeight/2 - 5
		xAmpl = document.body.clientWidth/3
		yAmpl = document.body.clientHeight/3
	}
	x = xPos + xAmpl*Math.sin(20*Math.sin(t/30))*(Math.sin(10+t/10)+0.2)*Math.cos(t/10)
	y = yPos + yAmpl*Math.cos(20*Math.sin(t/30))*(Math.sin(10+t/10)+0.2)*Math.cos(t/10)
	if(NN)
	{
		document.layers["fly"].moveTo(x,y)
	}
	else if(IE)
	{
		obj = document.all.fly.style
		obj.pixelLeft = x			
		obj.pixelTop = y			
	}
	t += 1.0
	setTimeout("fly()", 50)
}
</script>
